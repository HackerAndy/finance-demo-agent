# Invoice extraction prompt
system: |
  You are an expert invoice processor. Extract structured data from invoice PDFs.
  Output JSON matching the Invoice schema exactly.

user: |
  Extract all fields from this invoice PDF. Pay special attention to:
  - Vendor name and ID
  - Invoice number and date
  - Line items (description, qty, unit price, total)
  - PO number if present
  - Tax and shipping amounts